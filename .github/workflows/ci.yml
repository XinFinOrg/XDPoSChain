name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "*"
    tags:
      - "*"

env:
  GOPROXY: https://proxy.golang.org,direct
  GO111MODULE: on
  tf_version: "1.3.0"
  tf_init_cli_options: "-input=false"
  tf_validation_cli_options: ""
  tf_plan_cli_options: "-lock=false -input=false"
  tf_apply_cli_options: "-auto-approve -input=false"

jobs:
  tests:
    env:
      GOPATH: ${{ github.workspace }}
      GOBIN: ${{ github.workspace }}/bin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.GOPATH }}/src/XDPoSChain
    strategy:
      matrix:
        include:
          - name: A-B tests
            script: go run build/ci.go test -coverage $(go list ./... | grep "github.com/XinFinOrg/XDPoSChain/[a-b].*")
          - name: C-[a-m] tests
            script: go run build/ci.go test -coverage $(go list ./... | grep "github.com/XinFinOrg/XDPoSChain/c[a-m].*")
          - name: C-[n-o] tests
            script: go run build/ci.go test -coverage $(go list ./... | grep "github.com/XinFinOrg/XDPoSChain/c[n-o].*")
          - name: C-[p-z] tests
            script: go run build/ci.go test -coverage $(go list ./... | grep "github.com/XinFinOrg/XDPoSChain/c[p-z].*")
          - name: D-I tests
            script: go run build/ci.go test -coverage $(go list ./... | grep "github.com/XinFinOrg/XDPoSChain/[d-i].*")
          - name: J-N tests
            script: go run build/ci.go test -coverage $(go list ./... | grep "github.com/XinFinOrg/XDPoSChain/[j-n].*")
          - name: O-S tests
            script: go run build/ci.go test -coverage $(go list ./... | grep "github.com/XinFinOrg/XDPoSChain/[o-s].*")
          - name: T-Z tests
            script: go run build/ci.go test -coverage $(go list ./... | grep "github.com/XinFinOrg/XDPoSChain/[t-z].*")
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          path: ${{ env.GOPATH }}/src/XDPoSChain
      # Cache build tools to avoid downloading them each time
      - uses: actions/cache@v4
        with:
          path: ${{ env.GOPATH }}/src/XDPoSChain/build/cache
          key: ${{ runner.os }}-build-tools-cache-${{ hashFiles('**/build/checksums.txt') }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          cache: false
          go-version: "1.25.x"
      - name: Check gofmt
        run: |
          unformatted=$(git ls-files '*.go' | xargs -r gofmt -l)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
          echo "All Go files are properly formatted."
      - name: Check go mod tidy
        run: |
          set -euo pipefail
          go mod tidy -diff 2>&1 | sed '/^go: downloading/d'
          echo "go.mod and go.sum are tidy."
      - name: Validate generated files
        run: |
          go run build/ci.go generate
      - name: Run tests
        run: ${{ matrix.script }}
        env:
          GO111MODULE: auto

  tag_build:
    runs-on: ubuntu-latest
    needs: tests
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      - name: Build Docker image
        run: docker build --build-arg GIT_COMMIT=${GITHUB_SHA} -t xinfinorg/xdposchain:${GITHUB_REF#refs/tags/} -f cicd/Dockerfile .
      - name: Push Docker image
        run: docker push xinfinorg/xdposchain:${GITHUB_REF#refs/tags/}

  devnet_build_push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev-upgrade' && !startsWith(github.ref, 'refs/tags/')
    needs: tests
    outputs:
      output1: ${{ steps.docker.outputs.image_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      - name: Build and Push Docker images
        id: docker
        run: |
          git_hash=$(git rev-parse --short "$GITHUB_SHA")
          image_name=xinfinorg/devnet:dev-upgrade-${git_hash}
          docker pull xinfinorg/devnet:latest
          docker tag xinfinorg/devnet:latest xinfinorg/devnet:previous
          docker rmi xinfinorg/devnet:latest
          docker build --build-arg GIT_COMMIT=${GITHUB_SHA} -t xinfinorg/devnet:latest -f cicd/Dockerfile .
          docker tag xinfinorg/devnet:latest $image_name
          docker push $image_name
          docker push xinfinorg/devnet:latest
          docker push xinfinorg/devnet:previous
          echo "image_name=$image_name"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"

  devnet_k8_apply:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev-upgrade' && !startsWith(github.ref, 'refs/tags/')
    needs: devnet_build_push
    concurrency:
      group: devnet-k8-apply
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.19.11"
      - name: Apply new image version to Kubernetes deployments in batches
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

          git_hash=$(git rev-parse --short "$GITHUB_SHA")
          image="xinfinorg/devnet:dev-upgrade-${git_hash}"

          # Sort masternodes numerically by the trailing number (handles masternode1..masternode125)
          masternodes=$(kubectl get deployment -o json \
            | jq -r '.items[] | select(.metadata.name | test("^masternode[0-9]")) | .metadata.name' \
            | sort -V)
          readarray -t mn_array <<< "$masternodes"
          total=${#mn_array[@]}
          echo "Total masternode deployments: $total"

          BATCH_SIZE=25
          batch_num=0

          for (( start=0; start<total; start+=BATCH_SIZE )); do
            batch_num=$(( batch_num + 1 ))
            end=$(( start + BATCH_SIZE ))
            (( end > total )) && end=$total
            echo "=== Batch ${batch_num}: nodes $((start+1))–${end} ==="

            for (( i=start; i<end; i++ )); do
              name="${mn_array[$i]}"
              echo "  Updating deployment: $name"
              kubectl set image "deployment/$name" "$name=$image" || true
            done

            # Trigger peering-cronjob and wait for it to finish before next batch
            job_name="peering-batch-${batch_num}-$(date +%s)"
            echo "  Creating peering job: $job_name"
            kubectl create job "$job_name" --from=cronjob/peering-cronjob -n default

            echo "  Waiting for $job_name to complete..."
            while true; do
              complete=$(kubectl get job "$job_name" -n default \
                -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}')
              failed=$(kubectl get job "$job_name" -n default \
                -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}')
              if [[ "$complete" == "True" ]]; then
                echo "  Batch ${batch_num} peering done."
                break
              elif [[ "$failed" == "True" ]]; then
                echo "  Peering job $job_name failed — aborting."
                exit 1
              fi
              echo "  Still running, checking again in 30s..."
              sleep 30
            done
          done

          # Update RPC deployments (no peering needed)
          rpcs=$(kubectl get deployment -o json \
            | jq -r '.items[] | select(.metadata.name | test("rpc")) | .metadata.name')
          echo "Updating RPC deployments..."
          while read -r name; do
            kubectl set image "deployment/$name" "$name=$image" || true
          done <<< "$rpcs"

  devnet_send_notification:
    runs-on: ubuntu-latest
    needs: devnet_k8_apply
    if: github.ref == 'refs/heads/dev-upgrade' && !startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4
    - name: Send deployment notification
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_DEPLOYMENT_WEBHOOK_URL }}
        REPO: ${{ github.repository }}
      run: |
        # Extract PR number from merge commit message, e.g. "refactor(core): remove locals #30559 (#2176)"
        # Matches the last (#NNNN) pattern to get your repo's PR, not the upstream reference
        PR_NUMBER=$(git log -1 --format='%s' | grep -oP '\(#\K[0-9]+(?=\))' | tail -1 || true)

        PR_LINE="Commit: <https://github.com/${REPO}/commit/${GITHUB_SHA}|${GITHUB_SHA::7}>"
        if [ -n "$PR_NUMBER" ]; then
          PR_LINE+=$'\nMerged PR: <https://github.com/'"${REPO}"'/pull/'"${PR_NUMBER}"'|#'"${PR_NUMBER}"'>'
        fi

        curl -X POST -H 'Content-type: application/json' \
          --data "$(jq -n \
            --arg pr_line "$PR_LINE" \
            --arg sha "$GITHUB_SHA" \
            '{
              "text": ":rocket: Deployment: devnet",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": ":rocket: Deployment: devnet"}
                },
                {
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": ("Service: *xdc*\nEnvironment: *devnet*\nVersion: `" + $sha + "`\n" + $pr_line)}
                }
              ]
            }')" \
          "$SLACK_WEBHOOK"